<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>
    
    <script>
        console.log('Attempting to connect to Socket.IO at http://localhost:3000');
        const socket = io('http://localhost:3000', {
            transports: ['websocket', 'polling'],
            timeout: 10000,
            path: '/socket.io/'
        });
        
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        
        socket.on('connect', () => {
            console.log('Connected successfully!');
            statusDiv.innerHTML = '<span style="color: green;">Connected!</span>';
            messagesDiv.innerHTML += '<p>Connected to Socket.IO server</p>';
        });
        
        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            statusDiv.innerHTML = '<span style="color: red;">Connection failed: ' + error.message + '</span>';
            messagesDiv.innerHTML += '<p style="color: red;">Error: ' + error.message + '</p>';
        });
        
        socket.on('disconnect', (reason) => {
            console.log('Disconnected:', reason);
            statusDiv.innerHTML = '<span style="color: orange;">Disconnected: ' + reason + '</span>';
            messagesDiv.innerHTML += '<p>Disconnected: ' + reason + '</p>';
        });
        
        socket.on('status', (data) => {
            console.log('Received status:', data);
            messagesDiv.innerHTML += '<p>Server message: ' + JSON.stringify(data) + '</p>';
        });
    </script>
</body>
</html>
