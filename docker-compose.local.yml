# Local testing: HTTP only, no certbot / Let's Encrypt.
# App URL: http://localhost:8081 (8080 is often taken by local dev / WebSocket)
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  backend:
    environment:
      FRONTEND_ORIGIN: http://localhost:8081

  nginx:
    ports:
      - "8081:80"
    volumes:
      - ./frontend/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    command: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/ssl.conf && nginx -g 'daemon off;'"
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1

  certbot:
    profiles:
      - production-only
