version: "3.9"

services:
  backend:
    build: ./backend
    container_name: doctorscribe-backend
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "3000"

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_AWS_PRESIGN_S3_URL=${VITE_AWS_PRESIGN_S3_URL}
        - VITE_API_GATEWAY_BASE_URL=${VITE_API_GATEWAY_BASE_URL}
    container_name: doctorscribe-frontend
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: doctorscribe-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
