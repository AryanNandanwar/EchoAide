version: "3.9"

services:
  backend:
    build: ./backend
    container_name: doctorscribe-backend
    env_file:
      - .env
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    build:
      context: ./frontend
      args:
        - VITE_AWS_PRESIGN_S3_URL=${VITE_AWS_PRESIGN_S3_URL}
        - VITE_API_GATEWAY_BASE_URL=${VITE_API_GATEWAY_BASE_URL}
        # Empty: frontend paths already include /api; nginx proxies /api/ to the backend
        - VITE_REACT_APP_API_BASE_URL=${VITE_REACT_APP_API_BASE_URL:-}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
        # Leave empty so the app uses window.location.origin (nginx → backend)
        - VITE_REACT_APP_WEBSOCKET_URL=${VITE_REACT_APP_WEBSOCKET_URL:-}
    container_name: doctorscribe-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"