<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoctorScribe - WebSocket Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="https://unpkg.com/@mui/material@latest/umd/material-ui.development.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.connected {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.disconnected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.connecting {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .transcript {
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #2196f3;
        }
        .note {
            background-color: #f3e5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #9c27b0;
        }
        .controls {
            margin: 20px 0;
        }
        .btn {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background-color: #1976d2;
        }
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .btn.stop {
            background-color: #f44336;
        }
        .btn.stop:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function WebSocketTest() {
            const [socket, setSocket] = useState(null);
            const [status, setStatus] = useState('disconnected');
            const [transcript, setTranscript] = useState('');
            const [clinicalNote, setClinicalNote] = useState({});
            const [isRecording, setIsRecording] = useState(false);
            const [mediaRecorder, setMediaRecorder] = useState(null);
            const [error, setError] = useState('');

            useEffect(() => {
                connectWebSocket();
                return () => {
                    if (socket) {
                        socket.disconnect();
                    }
                };
            }, []);

            const connectWebSocket = () => {
                setStatus('connecting');
                setError('');
                
                console.log('Connecting to WebSocket at http://localhost:3000');
                const newSocket = io('http://localhost:3000', {
                    transports: ['websocket', 'polling'],
                    timeout: 10000,
                    path: '/socket.io/'
                });

                newSocket.on('connect', () => {
                    console.log('WebSocket connected successfully!');
                    setStatus('connected');
                    setSocket(newSocket);
                });

                newSocket.on('connect_error', (error) => {
                    console.error('WebSocket connection error:', error);
                    setStatus('disconnected');
                    setError(`Connection failed: ${error.message}`);
                });

                newSocket.on('disconnect', (reason) => {
                    console.log('WebSocket disconnected:', reason);
                    setStatus('disconnected');
                });

                newSocket.on('transcript', (data) => {
                    console.log('Received transcript:', data);
                    if (data.transcript) {
                        setTranscript(data.transcript);
                    }
                });

                newSocket.on('note_update', (data) => {
                    console.log('Received note update:', data);
                    if (data.note) {
                        setClinicalNote(data.note);
                    }
                });

                newSocket.on('status', (data) => {
                    console.log('Received status:', data);
                });
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const recorder = new MediaRecorder(stream);
                    setMediaRecorder(recorder);

                    const sessionId = `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                    
                    socket.emit('start_recording', { sessionId });
                    setIsRecording(true);

                    recorder.ondataavailable = (event) => {
                        if (event.data.size > 0 && socket) {
                            const reader = new FileReader();
                            reader.onload = () => {
                                const base64Audio = reader.result.split(',')[1];
                                socket.emit('audio_chunk', {
                                    data: base64Audio,
                                    timestamp: Date.now()
                                });
                            };
                            reader.readAsDataURL(event.data);
                        }
                    };

                    recorder.start(100); // Send audio chunks every 100ms
                } catch (error) {
                    console.error('Error starting recording:', error);
                    setError(`Failed to start recording: ${error.message}`);
                }
            };

            const stopRecording = () => {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                    
                    const sessionId = `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                    socket.emit('stop_recording', { sessionId });
                    
                    setIsRecording(false);
                    setMediaRecorder(null);
                }
            };

            const clearData = () => {
                setTranscript('');
                setClinicalNote({});
                setError('');
            };

            return (
                <div className="container">
                    <h1>DoctorScribe WebSocket Test</h1>
                    
                    <div className={`status ${status}`}>
                        <strong>WebSocket Status:</strong> {status.toUpperCase()}
                        {status === 'connected' && ' ✅'}
                        {status === 'disconnected' && ' ❌'}
                        {status === 'connecting' && ' ⏳'}
                    </div>

                    {error && (
                        <div className="status disconnected">
                            <strong>Error:</strong> {error}
                        </div>
                    )}

                    <div className="controls">
                        <button 
                            className="btn" 
                            onClick={startRecording} 
                            disabled={isRecording || status !== 'connected'}
                        >
                            🎤 Start Recording
                        </button>
                        <button 
                            className="btn stop" 
                            onClick={stopRecording} 
                            disabled={!isRecording}
                        >
                            ⏹️ Stop Recording
                        </button>
                        <button 
                            className="btn" 
                            onClick={clearData}
                        >
                            🗑️ Clear Data
                        </button>
                    </div>

                    {transcript && (
                        <div className="transcript">
                            <h3>📝 Live Transcript</h3>
                            <p>{transcript}</p>
                        </div>
                    )}

                    {Object.keys(clinicalNote).length > 0 && (
                        <div className="note">
                            <h3>🏥 Clinical Note</h3>
                            {Object.entries(clinicalNote).map(([section, content]) => (
                                <div key={section} style={{ marginBottom: '15px' }}>
                                    <h4>{section.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</h4>
                                    <p>{content}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{ marginTop: '30px', padding: '15px', backgroundColor: '#f5f5f5', borderRadius: '8px' }}>
                        <h3>🔧 Instructions</h3>
                        <ol>
                            <li>Make sure the backend is running on <code>http://localhost:3000</code></li>
                            <li>Click "Start Recording" to begin audio capture</li>
                            <li>Speak clearly into your microphone</li>
                            <li>Watch the live transcript appear in real-time</li>
                            <li>Clinical note sections will appear as they are generated</li>
                            <li>Click "Stop Recording" when finished</li>
                        </ol>
                        <p><strong>Note:</strong> This test page bypasses the old polling logic and uses direct WebSocket streaming.</p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<WebSocketTest />, document.getElementById('root'));
    </script>
</body>
</html>
